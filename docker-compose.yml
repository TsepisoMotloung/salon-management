version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ellens-salon-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ellens_salon
      MYSQL_USER: salon_user
      MYSQL_PASSWORD: salon_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
    driver: local
